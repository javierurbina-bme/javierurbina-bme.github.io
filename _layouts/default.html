<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
</head>

<body>

  <!-- Navigation bar -->
<nav style="
  padding: 15px 30px;
  background: #0d1117;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: sans-serif;
">
  <div style="font-weight: 600; font-size: 18px;">
    {{ site.title }}
  </div>

  <div>
    {% for item in site.nav %}
      <a href="{{ item.link }}" 
         style="margin-left: 25px; color: #c9d1d9; text-decoration: none; font-size: 15px;">
        {{ item.name }}
      </a>
    {% endfor %}
  </div>
</nav>

  <!-- Page content -->
  <main style="padding: 20px;">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer style="
  padding: 25px;
  text-align: center;
  color: #8b949e;
  font-size: 14px;
  margin-top: 40px;
  border-top: 1px solid #30363d;
">
  © 2026 Javier Urbina — Biomedical Engineer  
  <br><br>
  <a href="mailto:javier.urbina@tum.de" style="color:#58a6ff; margin-right:15px;">Email</a>
  <a href="https://www.linkedin.com/in/javierurbina" style="color:#58a6ff; margin-right:15px;">LinkedIn</a>
  <a href="https://scholar.google.com" style="color:#58a6ff; margin-right:15px;">Google Scholar</a>
  <a href="https://github.com/javierurbina-bme" style="color:#58a6ff;">GitHub</a>
  </footer>

</body>
</html>
